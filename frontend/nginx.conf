events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API requests to the backend container
        location /api/ {
            proxy_pass http://api:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve uploaded recipe images from the shared Docker volume.
        # The volume is mounted at /usr/share/nginx/html/uploads — nginx serves
        # it as static files under the /uploads/ URL prefix.
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Angular SPA — fall back to index.html for all unmatched routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
