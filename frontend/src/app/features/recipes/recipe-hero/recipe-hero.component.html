<div class="hero" [style.background-image]="imageUrl ? 'url(' + imageUrl + ')' : null">
  <!-- Nav bar overlaid on hero -->
  <div class="hero-nav">
    <button class="hero-btn" (click)="back.emit()" type="button" aria-label="Back to recipes">
      ← Back
    </button>
    <div class="hero-actions">
      <button class="hero-btn" (click)="edit.emit()" type="button" aria-label="Edit recipe">
        Edit
      </button>
      <button class="hero-btn hero-btn--delete" (click)="delete.emit()" type="button" aria-label="Delete recipe">
        Delete
      </button>
    </div>
  </div>

  <!-- Gradient scrim + title -->
  <div class="hero-scrim" aria-hidden="true"></div>
  <h1 class="hero-title">{{ title }}</h1>
</div>
