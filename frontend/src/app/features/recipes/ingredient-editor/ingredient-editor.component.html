<div class="ingredient-row" [formGroup]="ingredientGroup">
  <div class="autocomplete-wrap">
    <input
      class="field-input"
      type="text"
      placeholder="Ingredient"
      autocomplete="off"
      [formControl]="displayControl"
      [matAutocomplete]="ingredientAuto" />

    <mat-autocomplete
      #ingredientAuto="matAutocomplete"
      [displayWith]="displayFn"
      (optionSelected)="onOptionSelected($event)">

      @for (s of suggestions; track s.id) {
        @if (!s.isAddNew) {
          <mat-option class="ingredient-option" [value]="s">
            {{ s.name | ingredientCase }}
          </mat-option>
        } @else {
          <mat-option class="ingredient-option ingredient-option--add-new" [value]="s">
            <span class="add-new-label">+ Add "{{ s.name | ingredientCase }}" as a new ingredient</span>
          </mat-option>
        }
      }

      @if (isCreating) {
        <mat-option disabled class="ingredient-option">
          <span class="creating-label">Creating…</span>
        </mat-option>
      }
    </mat-autocomplete>
  </div>

  <input
    class="field-input field-input--amount"
    formControlName="amount"
    type="number"
    step="any"
    min="0"
    placeholder="Amount" />

  <select class="field-input field-input--unit" formControlName="unitId">
    <option value="">–</option>
    @for (unit of units; track unit.id) {
      <option [value]="unit.id">{{ unit.abbreviation || unit.name }}</option>
    }
  </select>

  <input
    class="field-input field-input--notes"
    formControlName="notes"
    type="text"
    placeholder="Notes (e.g. diced)" />

  <button
    type="button"
    class="btn-remove-ing"
    [attr.aria-label]="'Remove ingredient'"
    (click)="removed.emit()">
    ✕
  </button>
</div>
