<div class="ingredient-row" [formGroup]="ingredientGroup">
  <div class="autocomplete-wrap">
    <input
      class="field-input"
      type="text"
      placeholder="Ingredient"
      autocomplete="off"
      [formControl]="displayControl"
      [matAutocomplete]="ingredientAuto" />

    <mat-autocomplete
      #ingredientAuto="matAutocomplete"
      [displayWith]="displayFn"
      (optionSelected)="onOptionSelected($event)">

      @for (s of suggestions; track s.id) {
        @if (!s.isAddNew) {
          <mat-option class="ingredient-option" [value]="s">
            {{ s.name | ingredientCase }}
          </mat-option>
        } @else {
          <mat-option class="ingredient-option ingredient-option--add-new" [value]="s">
            <span class="add-new-label">+ Add "{{ s.name | ingredientCase }}" as a new ingredient</span>
          </mat-option>
        }
      }

      @if (isCreating) {
        <mat-option disabled class="ingredient-option">
          <span class="creating-label">Creating…</span>
        </mat-option>
      }
    </mat-autocomplete>
  </div>

  <input
    class="field-input field-input--amount"
    formControlName="amount"
    type="number"
    step="any"
    min="0"
    placeholder="Amount" />

  <div class="unit-wrap">
    <select
      class="field-input field-input--unit"
      formControlName="unitId"
      (change)="onUnitSelectChange($event)">
      <option value="">–</option>
      @for (unit of unitsService.units$ | async; track unit.id) {
        <option [value]="unit.id">{{ unit.abbreviation || unit.name }}</option>
      }
      <option value="__ADD_UNIT__" class="unit-option--add">+ Add unit…</option>
    </select>

    @if (showAddUnitForm) {
      <div class="add-unit-form" role="group" aria-label="Add new unit">
        <input
          class="field-input add-unit-form__input"
          type="text"
          placeholder="Name (e.g. sprig)"
          autocomplete="off"
          [formControl]="unitNameControl"
          (keydown.enter)="confirmAddUnit()"
          (keydown.escape)="cancelAddUnit()" />

        <input
          class="field-input add-unit-form__input add-unit-form__input--abbr"
          type="text"
          placeholder="Abbr. (optional)"
          autocomplete="off"
          [formControl]="unitAbbreviationControl"
          (keydown.enter)="confirmAddUnit()"
          (keydown.escape)="cancelAddUnit()" />

        <div class="add-unit-form__actions">
          <button
            type="button"
            class="btn-confirm-unit"
            [disabled]="unitNameControl.invalid || isCreatingUnit"
            (click)="confirmAddUnit()">
            {{ isCreatingUnit ? 'Adding…' : 'Add' }}
          </button>
          <button
            type="button"
            class="btn-cancel-unit"
            (click)="cancelAddUnit()">
            Cancel
          </button>
        </div>

        @if (unitNameError) {
          <p class="add-unit-error" role="alert">{{ unitNameError }}</p>
        }
      </div>
    }
  </div>

  <input
    class="field-input field-input--notes"
    formControlName="notes"
    type="text"
    placeholder="Notes (e.g. diced)" />

  <button
    type="button"
    class="btn-remove-ing"
    [attr.aria-label]="'Remove ingredient'"
    (click)="removed.emit()">
    ✕
  </button>
</div>
