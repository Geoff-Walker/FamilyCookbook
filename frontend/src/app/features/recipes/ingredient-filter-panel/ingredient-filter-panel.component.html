<div class="filter-panel-host">

  <!-- =====================================================================
       Trigger row (AC1, AC-D1, AC-D2)
       ===================================================================== -->
  <div class="trigger-row">
    <button
      class="filter-trigger"
      type="button"
      [class.filter-trigger--active]="selectedCount > 0"
      (click)="togglePanel()"
      [attr.aria-expanded]="isOpen"
      aria-controls="ingredient-filter-panel">
      <!-- Filter icon -->
      <svg class="trigger-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="11" y1="18" x2="13" y2="18"/>
      </svg>

      <span class="trigger-label">Filter by ingredients</span>

      <!-- AC-D2: count badge when collapsed and chips are selected -->
      @if (!isOpen && selectedCount > 0) {
        <span class="trigger-badge">{{ selectedCount }} ingredient{{ selectedCount === 1 ? '' : 's' }}</span>
      }

      <!-- Chevron indicating open/close state -->
      <svg class="trigger-chevron" [class.trigger-chevron--open]="isOpen"
           width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
  </div>

  <!-- =====================================================================
       Expanded panel (AC-D3, AC-D4, AC-D10)
       ===================================================================== -->
  <div
    id="ingredient-filter-panel"
    class="filter-panel"
    [class.filter-panel--open]="isOpen"
    role="region"
    aria-label="Ingredient filter">

    <!-- AC-D5: Chip input (with autocomplete) -->
    <div class="chip-input-wrap" [class.chip-input-wrap--shaking]="isShaking">
      <input
        class="chip-input chip-input--mobile"
        type="text"
        autocomplete="off"
        placeholder="Add an ingredient…"
        [value]="inputValue"
        (input)="onInputChange($any($event.target).value)"
        (blur)="onInputBlur()"
        aria-label="Search for an ingredient to add"
        aria-autocomplete="list"
        [attr.aria-expanded]="isSuggestionsOpen"
        aria-controls="ingredient-suggestions">
      <input
        class="chip-input chip-input--tablet"
        type="text"
        autocomplete="off"
        placeholder="Type an ingredient and press Enter…"
        [value]="inputValue"
        (input)="onInputChange($any($event.target).value)"
        (blur)="onInputBlur()"
        aria-label="Search for an ingredient to add"
        aria-autocomplete="list"
        [attr.aria-expanded]="isSuggestionsOpen"
        aria-controls="ingredient-suggestions">

      <!-- AC2: Autocomplete dropdown -->
      @if (isSuggestionsOpen) {
        <ul
          id="ingredient-suggestions"
          class="suggestions-list"
          role="listbox"
          aria-label="Ingredient suggestions">
          @for (suggestion of suggestions; track suggestion.id) {
            <li
              class="suggestion-item"
              role="option"
              [attr.aria-selected]="false"
              (mousedown)="selectIngredient(suggestion)">
              {{ suggestion.name }}
            </li>
          }
        </ul>
      }
    </div>

    <!-- AC3, AC-D6, AC-D7: Selected ingredient chips -->
    @if (selectedIngredients.length > 0) {
      <div class="chips-row">
        @for (chip of selectedIngredients; track chip.id) {
          <span
            class="ingredient-chip"
            [class.ingredient-chip--out]="chip.animState === 'out'">
            <span class="chip-label">{{ chip.name }}</span>
            <button
              class="chip-remove"
              type="button"
              [attr.aria-label]="'Remove ' + chip.name"
              (click)="removeIngredient(chip.id)">
              <svg width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </span>
        }
      </div>
    }

    <!-- AC-D8: Clear all link -->
    @if (selectedCount > 0) {
      <div class="clear-row">
        <button class="clear-all" type="button" (click)="clearAll()">
          Clear all
        </button>
      </div>
    }
  </div>
</div>
