<!-- Overlay — tap to dismiss -->
<div
  class="side-panel-overlay"
  [class.side-panel-overlay--open]="isOpen"
  aria-hidden="true"
  (click)="close()"
></div>

<!-- Side panel -->
<aside
  class="side-panel"
  [class.side-panel--open]="isOpen"
  role="dialog"
  aria-modal="true"
  aria-label="Navigation"
>

  <!-- Panel header -->
  <div class="side-panel__head">
    <span class="side-panel__head-title">Walker Family Cookbook</span>
    <button
      type="button"
      class="side-panel__close"
      aria-label="Close navigation menu"
      (click)="close()"
    >&#x2715;</button>
  </div>

  <!-- Nav list -->
  <nav class="side-panel__nav" aria-label="Main navigation">

    <a
      routerLink="/"
      routerLinkActive="side-panel__nav-item--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="side-panel__nav-item"
      (click)="close()"
    >
      <svg class="side-panel__nav-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="side-panel__nav-label">Recipes</span>
    </a>

    <a
      routerLink="/meal-planner"
      routerLinkActive="side-panel__nav-item--active"
      class="side-panel__nav-item"
      (click)="close()"
    >
      <svg class="side-panel__nav-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="side-panel__nav-label">Meal Planner</span>
    </a>

    <a
      routerLink="/admin"
      routerLinkActive="side-panel__nav-item--active"
      class="side-panel__nav-item"
      (click)="close()"
    >
      <span class="side-panel__nav-icon" aria-hidden="true">&#9881;</span>
      <span class="side-panel__nav-label">Admin</span>
    </a>

    <a
      routerLink="/geoff-filter"
      routerLinkActive="side-panel__nav-item--active"
      class="side-panel__nav-item"
      (click)="close()"
    >
      <span class="side-panel__nav-icon" aria-hidden="true">&#9878;</span>
      <span class="side-panel__nav-label">The Geoff Filter</span>
    </a>

  </nav>

  <!-- Panel footer -->
  <div class="side-panel__footer">
    <button
      type="button"
      class="side-panel__suggest-btn"
      (click)="onSuggestClick()"
    >+ Submit Suggestion</button>
  </div>

</aside>
