<header class="app-header">

  <!-- Left zone: user toggle -->
  <div class="app-header__zone app-header__zone--left">
    <app-user-toggle />
  </div>

  <!-- Centre zone: app title -->
  <div class="app-header__zone app-header__zone--centre">
    <span class="app-header__title">Walker Family Cookbook</span>
  </div>

  <!-- Right zone: burger icon -->
  <div class="app-header__zone app-header__zone--right">
    <button
      type="button"
      class="app-header__burger"
      aria-label="Open navigation menu"
      (click)="openPanel()"
    >
      <span class="app-header__burger-line" aria-hidden="true"></span>
      <span class="app-header__burger-line" aria-hidden="true"></span>
      <span class="app-header__burger-line" aria-hidden="true"></span>
    </button>
  </div>

</header>

<app-side-panel
  [isOpen]="isPanelOpen"
  (closed)="closePanel()"
/>
