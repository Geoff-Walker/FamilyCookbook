# Production Docker Compose for WalkerFCB.
# Images are pulled from ghcr.io (built by GitHub Actions on merge to main).
# Secrets are injected as environment variables — use Infisical CLI to run:
#   infisical run --env=prod -- docker compose -f docker-compose.prod.yml up -d

services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: walkerfcb
      POSTGRES_USER: walker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walker -d walkerfcb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    image: ghcr.io/geoff-walker/familycookbook-backend:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=walkerfcb;Username=walker;Password=${POSTGRES_PASSWORD}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/geoff-walker/familycookbook-frontend:latest
    ports:
      - "8088:80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
